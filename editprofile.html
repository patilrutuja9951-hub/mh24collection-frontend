<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile | MH24 Collection</title>
  <link rel="stylesheet" href="static/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: linear-gradient(to right, #2b0000, #8b0000, #2b0000);
      color: white;
    }

    .edit-container {
      width: 100%;
      max-width: 500px;
      background: #111;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .edit-container h1 {
      color: gold;
      margin-bottom: 25px;
      font-size: 32px;
      text-align: center;
    }

    .edit-container label {
      display: block;
      margin-top: 20px;
      margin-bottom: 8px;
      color: #ffc107;
      font-size: 14px;
    }

    .edit-container input,
    .edit-container textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: #fff;
      font-size: 15px;
    }

    .edit-container textarea {
      min-height: 100px;
      resize: vertical;
    }

    .btn-group {
      display: flex;
      gap: 15px;
      margin-top: 25px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      color: white;
      font-weight: bold;
      text-align: center;
      text-decoration: none;
      display: inline-block;
    }

    .save-btn {
      background: rgb(88, 3, 20);
    }

    .save-btn:hover {
      background: #ebc908;
      color: #111;
    }

    .cancel-btn {
      background: #333;
    }

    .cancel-btn:hover {
      background: #555;
    }

    @media (max-width: 500px) {
      .btn-group {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <div class="edit-container">

    <h1>Edit Profile</h1>

    <form id="profile-form">

      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Your full name" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" readonly>

      <label for="phone">Phone Number</label>
      <input type="text" id="phone" name="phone" placeholder="Your phone number">

      <label for="address">Address</label>
      <textarea id="address" name="address" placeholder="Your address"></textarea>

      <div class="btn-group">
        <button type="submit" class="btn save-btn">Save Changes</button>
        <a href="profile.html" class="btn cancel-btn">Cancel</a>
      </div>

    </form>

  </div>


  <!-- MOBILE MENUBAR -->
  <nav class="mobile-menubar" aria-label="Mobile menu">

    <a href="index.html" class="mm-item" title="Home">
      <i class="fa-solid fa-house"></i>
    </a>

    <a href="products.html" class="mm-item" title="Shop">
      <i class="fa-solid fa-store"></i>
    </a>

    <a href="favourites.html" class="mm-item" title="Favourites">
      <i class="fa-solid fa-heart"></i>
      <span class="mm-badge" id="mm-fav-count">0</span>
    </a>

    <a href="cart.html" class="mm-item" title="Cart">
      <i class="fa-solid fa-cart-shopping"></i>
      <span class="mm-badge" id="mm-cart-count">0</span>
    </a>

    <a href="profile.html" class="mm-item" title="Profile">
      <i class="fa-solid fa-user"></i>
    </a>

  </nav>


  <!-- SCRIPTS -->
  <script src="static/js/auth.js" defer></script>
  <script src="static/js/editprofile.js" defer></script>

</body>
</html>
