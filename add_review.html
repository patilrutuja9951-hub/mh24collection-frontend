<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Add Review</title>

    <link rel="stylesheet" href="static/css/style.css">    


    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <div>

        <h2>Add Review</h2>

        <label for="rating">
            Rating
        </label>

        <select id="rating" name="rating">

            <option value="">
                Select rating
            </option>

            <option value="1">
                1 ⭐
            </option>

            <option value="2">
                2 ⭐
            </option>

            <option value="3">
                3 ⭐
            </option>

            <option value="4">
                4 ⭐
            </option>

            <option value="5">
                5 ⭐
            </option>

        </select>

        <label for="comment">
            Comment
        </label>

        <textarea id="comment"
                  name="comment"
                  rows="5"
                  placeholder="Write your review..."></textarea>

        <button>
            Submit Review
        </button>

    </div>

    <footer>

        <div>

            <p>© 2026 MH24Collection. All rights reserved.</p>

        </div>

    </footer>

    <nav aria-label="Mobile menu">

    <a href="index.html">
        <i class="fa-solid fa-house"></i>
    </a>

    <a href="products.html">
        <i class="fa-solid fa-store"></i>
    </a>

    <a href="favourites.html">
        <i class="fa-solid fa-heart"></i>
        <span>0</span>
    </a>

    <a href="cart.html">
        <i class="fa-solid fa-cart-shopping"></i>
        <span>0</span>
    </a>

    <a href="profile.html">
        <i class="fa-solid fa-user"></i>
    </a>

</nav>


    <script src="static/js/main.js" defer></script>
    <script src="static/js/auth.js" defer></script>
</body>

</html>
