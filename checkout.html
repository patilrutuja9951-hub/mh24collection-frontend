<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | MH24 Collection</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="with-footer">

    <section class="category-hero">
        <h1>CHECKOUT</h1>
        <p>Complete your purchase</p>
    </section>

    <section class="checkout-container">

        <div class="checkout-form">
            <form id="checkout-form">

                <h2>Billing Details</h2>

                <label for="name">Full Name</label>
                <input type="text" id="name" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" required>

                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" required>

                <label for="address">Address</label>
                <textarea id="address" rows="4" required></textarea>

                <label for="city">City</label>
                <input type="text" id="city" required>

                <label for="pincode">Pincode</label>
                <input type="text" id="pincode" required>

                <h2>Payment Method</h2>

                <div class="payment-options">
                    <label>
                        <input type="radio" name="payment" required>
                        <span>Cash on Delivery</span>
                    </label>

                    <label>
                        <input type="radio" name="payment">
                        <span>Credit / Debit Card</span>
                    </label>

                    <label>
                        <input type="radio" name="payment">
                        <span>UPI</span>
                    </label>
                </div>

                <button class="checkout-btn" type="submit">
                    Place Order
                </button>

            </form>
        </div>

        <div class="order-summary">

            <h2>Your Order</h2>

            <div id="checkout-items"></div>

            <div class="checkout-pricing">
                <p>Shipping: ₹50</p>
                <h3>Total: <span id="checkout-total">0</span></h3>
            </div>

        </div>

    </section>

    <script src="/static/js/checkout.js"></script>

    <footer class="footer">
        <div class="footer-container">
            <p>© 2026 MH24Collection. All rights reserved.</p>
        </div>
    </footer>

</body>

</html>
